<h2 mat-dialog-title>Send reset link</h2>
<mat-dialog-content>Send a password reset email to {{ email }}?</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-button type="button" (click)="close(false)">Cancel</button>
  <button mat-flat-button color="primary" type="button" (click)="close(true)">Send</button>
</mat-dialog-actions>
