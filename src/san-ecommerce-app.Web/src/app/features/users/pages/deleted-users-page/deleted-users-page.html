<section class="app-page">
  <app-page-header title="Soft deleted users" subtitle="Restore archived identities without data loss." eyebrow="Resilience"></app-page-header>
  <app-data-table
    title="Inactive users"
    [columns]="columns"
    [rows]="rows()"
    [totalCount]="rows().length"
    [rowActions]="actions"
    (actionTriggered)="restore($event)"
  ></app-data-table>
</section>
