<form class="auth-form" [formGroup]="form" (ngSubmit)="submit()">
  <div>
    <h2>{{ 'auth.login' | translate }}</h2>
    <p>{{ 'auth.loginSubtitle' | translate }}</p>
  </div>

  <mat-form-field appearance="outline">
    <mat-label>{{ 'auth.email' | translate }}</mat-label>
    <input matInput type="email" formControlName="email" />
  </mat-form-field>
  <app-validation-message [control]="form.controls.email"></app-validation-message>

  <mat-form-field appearance="outline">
    <mat-label>{{ 'auth.password' | translate }}</mat-label>
    <input matInput type="password" formControlName="password" />
  </mat-form-field>
  <app-validation-message [control]="form.controls.password"></app-validation-message>

  <mat-checkbox formControlName="rememberMe">{{ 'auth.rememberMe' | translate }}</mat-checkbox>

  <button mat-flat-button color="primary" type="submit" [disabled]="isSubmitting()">
    {{ 'auth.login' | translate }}
  </button>

  <a routerLink="/auth/forgot-password">{{ 'auth.forgotPassword' | translate }}</a>
</form>
