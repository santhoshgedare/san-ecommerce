<form class="auth-form" [formGroup]="form" (ngSubmit)="submit()">
  <div>
    <h2>{{ 'auth.resetPassword' | translate }}</h2>
    <p>{{ 'auth.resetPasswordSubtitle' | translate }}</p>
  </div>
  <mat-form-field appearance="outline">
    <mat-label>{{ 'auth.email' | translate }}</mat-label>
    <input matInput type="email" formControlName="email" />
  </mat-form-field>
  <app-validation-message [control]="form.controls.email"></app-validation-message>
  <mat-form-field appearance="outline">
    <mat-label>{{ 'auth.resetToken' | translate }}</mat-label>
    <input matInput formControlName="token" />
  </mat-form-field>
  <app-validation-message [control]="form.controls.token"></app-validation-message>
  <mat-form-field appearance="outline">
    <mat-label>{{ 'auth.newPassword' | translate }}</mat-label>
    <input matInput type="password" formControlName="newPassword" />
  </mat-form-field>
  <app-validation-message [control]="form.controls.newPassword"></app-validation-message>
  <mat-form-field appearance="outline">
    <mat-label>{{ 'auth.confirmPassword' | translate }}</mat-label>
    <input matInput type="password" formControlName="confirmNewPassword" />
  </mat-form-field>
  <app-validation-message [control]="form.controls.confirmNewPassword"></app-validation-message>
  <button mat-flat-button color="primary" type="submit" [disabled]="isSubmitting()">
    {{ 'auth.resetPassword' | translate }}
  </button>
</form>
