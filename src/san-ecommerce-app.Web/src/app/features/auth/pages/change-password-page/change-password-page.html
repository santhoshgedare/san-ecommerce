<section class="app-page">
  <app-page-header title="Change password" subtitle="Rotate credentials and keep your account secure."></app-page-header>
  <form class="app-card page-section form-grid" [formGroup]="form" (ngSubmit)="submit()">
    <mat-form-field appearance="outline">
      <mat-label>{{ 'auth.password' | translate }}</mat-label>
      <input matInput type="password" formControlName="currentPassword" />
    </mat-form-field>
    <app-validation-message [control]="form.controls.currentPassword"></app-validation-message>
    <mat-form-field appearance="outline">
      <mat-label>{{ 'auth.newPassword' | translate }}</mat-label>
      <input matInput type="password" formControlName="newPassword" />
    </mat-form-field>
    <app-validation-message [control]="form.controls.newPassword"></app-validation-message>
    <mat-form-field appearance="outline">
      <mat-label>{{ 'auth.confirmPassword' | translate }}</mat-label>
      <input matInput type="password" formControlName="confirmNewPassword" />
    </mat-form-field>
    <app-validation-message [control]="form.controls.confirmNewPassword"></app-validation-message>
    <button mat-flat-button color="primary" type="submit" [disabled]="isSubmitting()">
      Update password
    </button>
  </form>
</section>
