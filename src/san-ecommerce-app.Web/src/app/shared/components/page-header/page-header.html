<header class="page-header">
  <div>
    @if (eyebrow()) {
      <span class="app-chip">{{ eyebrow() }}</span>
    }
    <h1>{{ title() }}</h1>
    @if (subtitle()) {
      <p>{{ subtitle() }}</p>
    }
  </div>
  <div class="page-header__actions">
    <ng-content select="[actions]"></ng-content>
  </div>
</header>
